<!DOCTYPE html>
<html><!-- lang/dir set by config -->
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <!-- Meta Pixel placeholder -->
  <script id="pixel-script"></script>
  <!-- GA4 placeholder -->
  <script id="ga4-script"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#25D366;--dark:#075E54;--accent:#FFD700;
      --bg:#f5f9f7;--surface:#fff;--surface2:#eef4f1;
      --text:#0d1f1a;--muted:#4a6555;--radius:14px;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font,'Cairo'),sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(7,94,84,.95);backdrop-filter:blur(14px);padding:13px 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:1.3rem;font-weight:900;color:#fff}
    .logo span{color:var(--green)}
    .nav-cta{background:var(--green);color:#000;font-weight:700;font-size:.88rem;border:none;border-radius:50px;padding:8px 22px;cursor:pointer;text-decoration:none;transition:transform .15s}
    .nav-cta:hover{transform:scale(1.05)}

    /* HERO */
    .hero{min-height:100vh;display:flex;align-items:center;gap:48px;padding:100px 64px 60px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(34,197,94,.1),transparent 70%),var(--bg)}
    .hero-text{flex:1.2;min-width:0}
    .hero-form{flex:0.85;min-width:0}
    .badge{display:inline-block;background:rgba(34,197,94,.12);border:1px solid var(--green);color:var(--dark);font-size:.77rem;font-weight:700;padding:4px 16px;border-radius:50px;margin-bottom:20px}
    .hero-text h1{font-size:clamp(1.9rem,4vw,3.2rem);font-weight:900;line-height:1.25;margin-bottom:14px}
    .hero-text h1 .hl{color:var(--green)}
    .hero-text p{color:var(--muted);font-size:1rem;margin-bottom:26px;max-width:460px}
    .statement{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:900;color:var(--dark);background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);border-radius:12px;padding:14px 20px}
    .statement span{color:var(--accent)}

    /* FORM */
    .form-card{background:var(--surface);border:1.5px solid rgba(7,94,84,.15);border-radius:20px;padding:32px 28px;box-shadow:0 8px 40px rgba(7,94,84,.1);position:relative}
    .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--dark),var(--green));border-radius:20px 20px 0 0}
    .form-title{font-size:1.15rem;font-weight:900;text-align:center;margin-bottom:4px}
    .form-title span{color:var(--green)}
    .form-sub{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:20px}
    .fg{margin-bottom:14px}
    .fg label{display:block;font-weight:700;font-size:.82rem;margin-bottom:5px;color:var(--dark)}
    .fg input,.fg select{width:100%;padding:12px 14px;background:#fff;border:1.5px solid rgba(7,94,84,.18);border-radius:10px;color:var(--text);font-family:inherit;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;direction:inherit;-webkit-appearance:none}
    .fg input::placeholder{color:#9ab8a8}
    .fg input:focus,.fg select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
    .fg select option{background:#fff}
    .submit-btn{width:100%;padding:15px;background:var(--green);color:#000;font-family:inherit;font-weight:900;font-size:1rem;border:none;border-radius:50px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s,opacity .15s}
    .submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(34,197,94,.4)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed}

    /* REVIEWS */
    .reviews-mini{margin-top:16px;display:flex;flex-direction:column;gap:10px}
    .review-item{background:#eef4f1;border:1px solid rgba(7,94,84,.1);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:11px}
    .review-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(34,197,94,.35)}
    .review-name{font-weight:700;font-size:.84rem;margin-bottom:2px}
    .review-stars{color:var(--accent);font-size:.76rem;margin-bottom:4px}
    .review-text{font-size:.79rem;color:var(--muted);line-height:1.5}
    .review-city{font-size:.7rem;color:var(--dark);opacity:.65;margin-top:3px}

    /* FEATURES */
    .features{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:20px 24px 48px}
    .feat-card{background:var(--surface);border:1px solid rgba(7,94,84,.1);border-radius:var(--radius);padding:24px 16px;text-align:center;min-width:148px;max-width:200px;flex:1;box-shadow:0 2px 12px rgba(7,94,84,.06);transition:transform .2s,border-color .2s}
    .feat-card:hover{transform:translateY(-4px);border-color:var(--green)}
    .feat-icon{font-size:2.2rem;margin-bottom:8px}
    .feat-card strong{font-size:.87rem;display:block;margin-bottom:4px}
    .feat-card p{font-size:.77rem;color:var(--muted)}

    /* STATS */
    .stats-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;padding:52px 24px;background:linear-gradient(135deg,var(--dark),#0d1f1a)}
    .stat{text-align:center;flex:1;min-width:120px}
    .stat-num{font-size:2.4rem;font-weight:900;color:var(--accent)}
    .stat-label{color:#dcfce7;font-size:.82rem;margin-top:4px}

    /* FOOTER */
    footer{text-align:center;padding:28px 24px;color:var(--muted);font-size:.83rem;border-top:1px solid rgba(7,94,84,.1);background:#eef4f1}
    footer span{color:var(--dark);font-weight:700}

    @media(max-width:860px){
      .hero{flex-direction:column;padding:88px 20px 40px;gap:28px;text-align:center}
      .hero-text p{margin:0 auto 26px}
      .hero-form{width:100%}
      nav{padding:12px 18px}
    }
    @media(max-width:480px){.form-card{padding:24px 16px}.hero-text h1{font-size:1.85rem}}
  </style>
</head>
<body>

<nav>
  <span class="logo" id="nav-logo">Brand</span>
  <a href="#form" class="nav-cta" id="nav-cta">اطلب الآن →</a>
</nav>

<section class="hero">
  <div class="hero-text">
    <div class="badge" id="hero-badge"></div>
    <h1 id="hero-headline"></h1>
    <p id="hero-sub"></p>
    <div class="statement" id="hero-statement"></div>
  </div>
  <div class="hero-form">
    <div class="form-card">
      <div class="form-title" id="form-title"></div>
      <div class="form-sub" id="form-sub"></div>
      <form id="leadForm" novalidate>
        <div class="fg"><label>الاسم الكريم</label><input type="text" id="name" placeholder="محمد، عبدالله، ..." required/></div>
        <div class="fg"><label>رقم الواتساب</label><input type="tel" id="phone" placeholder="06XXXXXXXX" required/></div>
        <div class="fg" id="service-group">
          <label>المنتج المطلوب</label>
          <select id="service" required><option value="" disabled selected>— اختر المنتج —</option></select>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <span id="btnText">اطلب الآن</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>
    <div class="reviews-mini" id="reviews"></div>
  </div>
</section>

<div class="features" id="features"></div>

<div class="stats-row" id="stats"></div>

<footer>
  <p><span id="footer-copy"></span> — <span id="footer-brand"></span></p>
  <p style="margin-top:5px;font-size:.76rem" id="footer-sub"></p>
</footer>

<!-- Load config first, then render -->
<script src="./config.js"></script>
<script>
(function(){
  // Apply CSS variables
  const r = document.documentElement;
  r.style.setProperty('--green',  CONFIG.colors.primary);
  r.style.setProperty('--dark',   CONFIG.colors.dark);
  r.style.setProperty('--accent', CONFIG.colors.accent);
  r.style.setProperty('--bg',     CONFIG.colors.bg);
  r.style.setProperty('--font',   CONFIG.font);

  // Set lang/dir
  document.documentElement.lang = CONFIG.lang;
  document.documentElement.dir  = CONFIG.dir;
  document.title = CONFIG.brand.name + ' — ' + CONFIG.brand.tagline;

  // Google Fonts
  const link = document.createElement('link');
  link.rel  = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + CONFIG.font + ':wght@400;600;700;900&display=swap';
  document.head.appendChild(link);

  // Meta Pixel
  if (CONFIG.tracking.metaPixelId) {
    const s = document.getElementById('pixel-script');
    s.textContent = `!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${CONFIG.tracking.metaPixelId}');fbq('track','PageView');`;
  }

  // GA4
  if (CONFIG.tracking.ga4Id) {
    const ga = document.createElement('script');
    ga.async = true; ga.src = 'https://www.googletagmanager.com/gtag/js?id=' + CONFIG.tracking.ga4Id;
    document.head.appendChild(ga);
    const s = document.getElementById('ga4-script');
    s.textContent = `window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${CONFIG.tracking.ga4Id}');`;
  }

  // Nav
  document.getElementById('nav-logo').textContent  = CONFIG.brand.name;
  document.getElementById('nav-cta').textContent   = CONFIG.form.submitLabel + ' →';

  // Hero
  document.getElementById('hero-badge').textContent = CONFIG.hero.badge;
  document.getElementById('hero-headline').innerHTML = CONFIG.hero.headline + '<br/><span class="hl">' + CONFIG.hero.highlight + '</span>';
  document.getElementById('hero-sub').textContent   = CONFIG.hero.subtext;
  document.getElementById('hero-statement').innerHTML = CONFIG.hero.statement;

  // Form
  document.getElementById('form-title').innerHTML  = '📩 ' + CONFIG.form.title;
  document.getElementById('form-sub').textContent  = CONFIG.form.sub;
  document.getElementById('btnText').textContent   = CONFIG.form.submitLabel;
  const sel = document.getElementById('service');
  CONFIG.form.services.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });

  // Reviews
  const rv = document.getElementById('reviews');
  CONFIG.reviews.forEach(r => {
    rv.innerHTML += `<div class="review-item">
      <img class="review-avatar" src="${r.avatar}" alt="${r.name}" loading="lazy"/>
      <div>
        <div class="review-name">${r.name}</div>
        <div class="review-stars">${'★'.repeat(r.rating)}</div>
        <div class="review-text">${r.text}</div>
        <div class="review-city">${r.city}</div>
      </div>
    </div>`;
  });

  // Features
  const ft = document.getElementById('features');
  CONFIG.features.forEach(f => {
    ft.innerHTML += `<div class="feat-card"><div class="feat-icon">${f.icon}</div><strong>${f.title}</strong><p>${f.desc}</p></div>`;
  });

  // Stats
  const st = document.getElementById('stats');
  CONFIG.stats.forEach(s => {
    st.innerHTML += `<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`;
  });

  // Footer
  document.getElementById('footer-copy').textContent  = CONFIG.footer.copy + ' ' + CONFIG.brand.name;
  document.getElementById('footer-brand').textContent = CONFIG.brand.tagline;
  document.getElementById('footer-sub').textContent   = CONFIG.footer.sub;

  // Form submit
  document.getElementById('leadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name    = document.getElementById('name').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const service = document.getElementById('service').value;
    if (!name || !phone || !service) return;
    const btn = document.getElementById('submitBtn');
    const txt = document.getElementById('btnText');
    btn.disabled = true; txt.textContent = 'جارٍ الإرسال...';

    const eventId = 'lead_' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
    if (typeof fbq !== 'undefined') fbq('track','Lead',{content_name:service},{eventID:eventId});
    if (typeof gtag !== 'undefined') gtag('event','generate_lead',{event_label:service});

    try {
      await fetch(CONFIG.api.submitUrl, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, phone, service, eventId,
          pixelId: CONFIG.tracking.metaPixelId,
          userAgent: navigator.userAgent, eventSourceUrl: location.href})
      });
    } catch(_){}
    window.location.href = CONFIG.api.successUrl;
  });
})();
</script>
</body>
</html>
