<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Sent — AmraniAds</title>
  <link rel="icon" href="/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-127KF5ZQCH"></script>
  <script>
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());
    gtag('config','G-127KF5ZQCH');
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#22c55e;--dark-green:#075E54;--gold:#d97706;
      --bg:#f5f9f7;--surface:#ffffff;--text:#0d1f1a;--muted:#4a6555;
    }
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:24px;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(34,197,94,.1) 0%,transparent 70%),var(--bg);
    }
    .card{
      background:var(--surface);
      border:1.5px solid rgba(7,94,84,.15);
      border-radius:24px;padding:52px 44px;
      max-width:480px;width:100%;text-align:center;
      box-shadow:0 8px 40px rgba(7,94,84,.1);
      position:relative;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--green),var(--dark-green),var(--green));
      border-radius:24px 24px 0 0;
    }
    .check{
      width:80px;height:80px;
      background:rgba(34,197,94,.1);border:2px solid var(--green);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;font-size:2.2rem;
    }
    h1{font-size:1.9rem;font-weight:900;margin-bottom:12px}
    h1 span{color:var(--green)}
    .sub{color:var(--muted);font-size:1rem;margin-bottom:36px;line-height:1.8}
    .wa-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:var(--green);color:#000;
      font-family:'Inter',sans-serif;font-weight:900;font-size:1.05rem;
      padding:16px 32px;border-radius:50px;text-decoration:none;
      box-shadow:0 8px 28px rgba(34,197,94,.3);
      transition:transform .15s,box-shadow .15s;margin-bottom:20px;
    }
    .wa-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(34,197,94,.45)}
    .back{
      color:var(--muted);font-size:.88rem;text-decoration:none;
      display:inline-block;margin-top:4px;transition:color .15s;
    }
    .back:hover{color:var(--green)}
    @media(max-width:480px){.card{padding:36px 20px}h1{font-size:1.6rem}}
  </style>
</head>
<body>

<div class="card">
  <div class="check">✅</div>
  <h1>Request <span>Sent</span> Successfully!</h1>
  <p class="sub">
    Thank you — the AmraniAds team will get back to you as soon as possible.
  </p>

  <a href="/en.html" class="back">← Back to homepage</a>
</div>

</body>
</html>
