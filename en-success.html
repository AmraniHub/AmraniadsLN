    }
    body{

      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:24px;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(34,197,94,.1) 0%,transparent 70%),var(--bg);
    }
    .card{
      background:var(--surface);
      border:1.5px solid rgba(7,94,84,.15);
      border-radius:24px;padding:52px 44px;
      max-width:480px;width:100%;text-align:center;
      box-shadow:0 8px 40px rgba(7,94,84,.1);
      position:relative;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--green),var(--dark-green),var(--green));
      border-radius:24px 24px 0 0;
    }
    .check{
      width:80px;height:80px;
      background:rgba(34,197,94,.1);border:2px solid var(--green);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;font-size:2.2rem;
    }
    h1{font-size:1.9rem;font-weight:900;margin-bottom:12px}
    h1 span{color:var(--green)}
    .sub{color:var(--muted);font-size:1rem;margin-bottom:36px;line-height:1.8}
    .wa-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:var(--green);color:#000;
      font-family:'Inter',sans-serif;font-weight:900;font-size:1.05rem;
      padding:16px 32px;border-radius:50px;text-decoration:none;
      box-shadow:0 8px 28px rgba(34,197,94,.3);
      transition:transform .15s,box-shadow .15s;margin-bottom:20px;
    }
    .wa-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(34,197,94,.45)}
    .back{
      color:var(--muted);font-size:.88rem;text-decoration:none;
      display:inline-block;margin-top:4px;transition:color .15s;
    }
    .back:hover{color:var(--green)}
    @media(max-width:480px){.card{padding:36px 20px}h1{font-size:1.6rem}}
